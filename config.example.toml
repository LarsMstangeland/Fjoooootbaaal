[app]
interval_secs = 15
request_timeout_secs = 10
user_agent = "ticket-listener/0.1 (+personal availability monitor)"

[actions]
open_browser = true
notify_once_per_target = true
# Optional Discord/Slack-style webhook. Leave blank to disable.
# webhook_url = "https://discord.com/api/webhooks/..."

[service]
subscribers_path = "subscribers.json"
# Base form users receive before purchase. Query params are appended automatically.
purchase_form_url = "https://www.fotballfesten.no/frognerstadion"
# Check links before sending SMS, and fall back if the Fanparks link is dead.
verify_links = true

[sms]
# Dry-run logs SMS payloads instead of sending them. Set to false when webhook_url is real.
dry_run = true
# Generic SMS gateway webhook. It receives JSON: {"to": "+4712345678", "message": "..."}
# webhook_url = "https://your-sms-provider.example/send"

[[targets]]
name = "Fotballfesten Frogner Stadion"
enabled = true
url = "https://www.fotballfesten.no/frognerstadion"
# The monitor marks this as available if this regex matches the response body.
available_regex = "(?i)(kj.p|bestill|velg billetter|tickets available|buy now|add to basket|purchase)"
# If this regex matches, it overrides available_regex and marks the page as sold out.
sold_out_regex = "(?i)(billetter kommer snart|utsolgt|sold out|no tickets|ikke tilgjengelig)"
# Optional: open a separate URL when available, e.g. the exact checkout/event URL.
open_url = "https://www.fotballfesten.no/frognerstadion"
# When the event page exposes a Fanparks booking URL, use it as the form link.
purchase_link_regex = "https://fanparks\\.fanparks\\.com/booking/[^\"'<>\\s]+"
# Optional target-specific form URL. Falls back to [service].purchase_form_url.
# purchase_form_url = "https://example.com/ticket-request"
prefill = { event = "Norge - England kvartfinale", venue = "Frogner Stadion", ticket_type = "bord", quantity = "1", guests = "8" }
